<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC Comics Dashboard</title>
    <style>
        @font-face {
            font-family: "DcTitle";
            src: url("fonts/Gotham.ttf") format("truetype");
            font-weight: 900;
        }

        @font-face {
            font-family: "DcText";
            src: url("fonts/Gotham Nights Bold Italic.otf") format("opentype");
            font-weight: 900;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            color: #ffffff;
            background: #06111d;
            font-family: "DcText", "Impact", "Arial Black", sans-serif;
        }

        .screen {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 412px;
            height: 917px;
            overflow: hidden;
            padding: 0 8px 91px;
            background: #111 url("../imgs/wallpaper 1.png") center / cover no-repeat;
            transform: translate(-50%, -50%) scale(var(--app-scale, 1));
            transform-origin: center;
        }

        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(196, 192, 173, 0.36);
            pointer-events: none;
        }

        .small-logo {
            position: absolute;
            z-index: 3;
            top: 7px;
            left: 7px;
            width: 48px;
            height: 48px;
            display: block;
        }

        .small-logo img,
        .profile-stack img,
        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .small-logo img {
            object-fit: contain;
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-stack {
            position: relative;
            width: 94px;
            height: 96px;
            margin-top: 60px;
        }

        .profile-chip {
            position: absolute;
            overflow: hidden;
            border-radius: 7px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.52);
        }

        .profile-chip.main {
            z-index: 3;
            top: 0;
            left: 36px;
            width: 55px;
            height: 55px;
        }

        .profile-chip.side {
            z-index: 2;
            top: 29px;
            left: 4px;
            width: 47px;
            height: 47px;
        }

        .profile-chip.front {
            z-index: 4;
            top: 54px;
            left: 15px;
            width: 55px;
            height: 42px;
        }

        .profile-chip.main img {
            object-position: 13% 72%;
        }

        .profile-chip.side img {
            object-position: 37% 45%;
        }

        .profile-chip.front img {
            object-position: center 44%;
        }

        .title {
            margin-top: 61px;
            color: #ffffff;
            font-family: "DcTitle", "Impact", "Arial Black", sans-serif;
            font-size: 39px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: 0;
            text-align: center;
            text-transform: uppercase;
            -webkit-text-stroke: 2px #08213d;
            text-shadow:
                3px 3px 0 #061e3c,
                0 4px 5px rgba(0, 0, 0, 0.5);
        }

        .welcome {
            margin-top: 42px;
            color: #ffffff;
            font-size: 22px;
            line-height: 1;
            font-style: italic;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            transform: scaleX(0.82);
            text-shadow: 0 3px 5px rgba(0, 0, 0, 0.72);
            white-space: nowrap;
        }

        .tiles {
            width: 100%;
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .tile {
            position: relative;
            width: 348px;
            height: 105px;
            overflow: hidden;
            border-radius: 18px;
            border: 1px solid rgba(0, 0, 0, 0.18);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.42);
            text-decoration: none;
            color: #ffffff;
            background: #07213a;
        }

        .tile img {
            filter: saturate(1.08) contrast(1.05);
        }

        .tile.characters img {
            object-position: center 50%;
        }

        .tile.cities img {
            object-position: center 48%;
        }

        .tile.teams img {
            object-position: center 42%;
        }

        .tile::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.03);
        }

        .tile-title {
            position: absolute;
            z-index: 2;
            inset: 0;
            display: grid;
            place-items: center;
            color: #ffffff;
            font-family: "DcTitle", "Impact", "Arial Black", sans-serif;
            font-size: 30px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
            -webkit-text-stroke: 1.4px #08213d;
            text-shadow:
                2px 2px 0 #08213d,
                0 3px 4px rgba(0, 0, 0, 0.65);
        }

        .bottom-nav {
            position: absolute;
            z-index: 4;
            left: 0;
            right: 0;
            bottom: 0;
            height: 89px;
            padding: 16px 5px 17px;
            display: grid;
            grid-template-columns: 73px 73px 73px 73px 73px;
            gap: 4px;
            align-items: center;
            justify-content: center;
            background: rgba(4, 33, 59, 0.78);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .nav-link {
            height: 43px;
            display: grid;
            place-items: center;
            border-radius: 9px;
            color: #ffffff;
            background: rgba(2, 11, 22, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.38);
            font-size: 14px;
            font-style: italic;
            font-weight: 900;
            line-height: 1;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            transform: scaleX(0.82);
            transform-origin: center;
            white-space: nowrap;
        }

        .nav-link.active {
            height: 43px;
            border-radius: 10px;
            background: #0785ff;
        }
    </style>
</head>

<body>
    <main class="screen">
        <a class="small-logo" href="index.html" aria-label="Volver al inicio">
            <img src="../imgs/DC_Comics_logo.svg" alt="">
        </a>

        <section class="content" aria-label="Dashboard DC Comics">
            <div class="profile-stack" aria-hidden="true">
                <span class="profile-chip side">
                    <img src="../imgs/Profile.webp" alt="">
                </span>
                <span class="profile-chip main">
                    <img src="../imgs/wallpaper 1.png" alt="">
                </span>
                <span class="profile-chip front">
                    <img src="../imgs/Los_Jovenes_Titanes.avif" alt="">
                </span>
            </div>

            <h1 class="title">Dashboard</h1>
            <p class="welcome">Welcome to the dashboard</p>

            <div class="tiles" aria-label="Secciones">
                <a class="tile characters" href="#" aria-label="Characters">
                    <img src="../imgs/Profile.webp" alt="">
                    <span class="tile-title">Characters</span>
                </a>

                <a class="tile cities" href="#" aria-label="Cities">
                    <img src="../imgs/Central_City_Flash.png" alt="">
                    <span class="tile-title">Cities</span>
                </a>

                <a class="tile teams" href="#" aria-label="Teams">
                    <img src="../imgs/Los_Jovenes_Titanes.avif" alt="">
                    <span class="tile-title">Teams</span>
                </a>
            </div>
        </section>

        <nav class="bottom-nav" aria-label="Navegacion principal">
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="#">My profile</a>
            <a class="nav-link" href="#">Characters</a>
            <a class="nav-link" href="#">Cities</a>
            <a class="nav-link" href="#">Teams</a>
        </nav>
    </main>

    <script>
        const appWidth = 412;
        const appHeight = 917;

        function keepAndroidCompactSize() {
            const scale = Math.min(
                window.innerWidth / appWidth,
                window.innerHeight / appHeight,
                1
            );

            document.documentElement.style.setProperty("--app-scale", scale);
        }

        keepAndroidCompactSize();
        window.addEventListener("resize", keepAndroidCompactSize);
    </script>
</body>

</html>
