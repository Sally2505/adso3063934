<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC Comics Dashboard</title>
    <style>
        @font-face {
            font-family: "DcTitle";
            src: url("fonts/Gotham.ttf") format("truetype");
            font-weight: 900;
        }

        @font-face {
            font-family: "DcText";
            src: url("fonts/Gotham Nights Bold Italic.otf") format("opentype");
            font-weight: 900;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            color: #ffffff;
            background: #06111d;
            font-family: "DcText", "Impact", "Arial Black", sans-serif;
        }

        .screen {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 412px;
            height: 917px;
            overflow: hidden;
            padding: 0 8px 91px;
            background: #111 url("../imgs/wallpaper 1.png") center / cover no-repeat;
            transform: translate(-50%, -50%) scale(var(--app-scale, 1));
            transform-origin: center;
        }

        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(196, 192, 173, 0.36);
            pointer-events: none;
        }

        .small-logo {
            position: absolute;
            z-index: 8;
            top: 7px;
            left: 7px;
            width: 48px;
            height: 48px;
            display: block;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
        }

        .small-logo img,
        .sidebar-logo img,
        .sidebar-option img,
        .profile-stack img,
        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .small-logo img {
            object-fit: contain;
        }

        .sidebar-shade {
            position: absolute;
            z-index: 18;
            inset: 0;
            background: rgba(4, 33, 59, 0.46);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.24s ease;
        }

        .sidebar {
            position: absolute;
            z-index: 19;
            top: 0;
            left: 0;
            width: 297px;
            height: 100%;
            padding: 101px 13px 0;
            background: rgba(4, 33, 59, 0.93);
            transform: translateX(-100%);
            transition: transform 0.24s ease;
            box-shadow: 12px 0 18px rgba(0, 0, 0, 0.24);
        }

        .screen.sidebar-open .sidebar {
            transform: translateX(0);
        }

        .screen.sidebar-open .sidebar-shade {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar-logo {
            position: absolute;
            top: 8px;
            right: 11px;
            width: 48px;
            height: 48px;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
        }

        .sidebar-logo img {
            object-fit: contain;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .sidebar-option {
            position: relative;
            width: 270px;
            height: 96px;
            overflow: hidden;
            border-radius: 18px;
            color: #ffffff;
            text-decoration: none;
            background: #08213d;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }

        .sidebar-option::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(4, 33, 59, 0.18);
            transition: background 0.18s ease;
        }

        .sidebar-option:hover::after,
        .sidebar-option:focus-visible::after,
        .sidebar-option:active::after {
            background: rgba(7, 133, 255, 0.44);
        }

        .sidebar-option span {
            position: absolute;
            z-index: 2;
            inset: 0;
            display: grid;
            place-items: center;
            color: #ffffff;
            font-family: "DcTitle", "Impact", "Arial Black", sans-serif;
            font-size: 30px;
            line-height: 1;
            text-transform: uppercase;
            -webkit-text-stroke: 1.4px #08213d;
            text-shadow:
                2px 2px 0 #08213d,
                0 3px 5px rgba(0, 0, 0, 0.66);
        }

        .sidebar-option.dashboard img {
            object-position: center 45%;
        }

        .sidebar-option.profile img {
            object-position: center 42%;
        }

        .sidebar-option.characters img {
            object-position: center 50%;
        }

        .sidebar-option.cities img {
            object-position: center 48%;
        }

        .sidebar-option.teams img {
            object-position: center 42%;
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-stack {
            position: relative;
            width: 94px;
            height: 96px;
            margin-top: 60px;
        }

        .profile-chip {
            position: absolute;
            overflow: hidden;
            border-radius: 7px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.52);
        }

        .profile-chip.main {
            z-index: 3;
            top: 0;
            left: 36px;
            width: 55px;
            height: 55px;
        }

        .profile-chip.side {
            z-index: 2;
            top: 29px;
            left: 4px;
            width: 47px;
            height: 47px;
        }

        .profile-chip.front {
            z-index: 4;
            top: 54px;
            left: 15px;
            width: 55px;
            height: 42px;
        }

        .profile-chip.main img {
            object-position: 13% 72%;
        }

        .profile-chip.side img {
            object-position: 37% 45%;
        }

        .profile-chip.front img {
            object-position: center 44%;
        }

        .title {
            margin-top: 61px;
            color: #ffffff;
            font-family: "DcTitle", "Impact", "Arial Black", sans-serif;
            font-size: 39px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: 0;
            text-align: center;
            text-transform: uppercase;
            -webkit-text-stroke: 2px #08213d;
            text-shadow:
                3px 3px 0 #061e3c,
                0 4px 5px rgba(0, 0, 0, 0.5);
        }

        .welcome {
            margin-top: 42px;
            color: #ffffff;
            font-size: 22px;
            line-height: 1;
            font-style: italic;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            transform: scaleX(0.82);
            text-shadow: 0 3px 5px rgba(0, 0, 0, 0.72);
            white-space: nowrap;
        }

        .tiles {
            width: 100%;
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .tile {
            position: relative;
            width: 348px;
            height: 105px;
            overflow: hidden;
            border-radius: 18px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.42);
            text-decoration: none;
            color: #ffffff;
            background: #07213a;
        }

        .tile img {
            filter: saturate(1.08) contrast(1.05);
        }

        .tile.characters img {
            object-position: center 50%;
        }

        .tile.cities img {
            object-position: center 48%;
        }

        .tile.teams img {
            object-position: center 42%;
        }

        .tile::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.03);
        }

        .tile-title {
            position: absolute;
            z-index: 2;
            inset: 0;
            display: grid;
            place-items: center;
            color: #ffffff;
            font-family: "DcTitle", "Impact", "Arial Black", sans-serif;
            font-size: 30px;
            line-height: 1;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
            -webkit-text-stroke: 1.4px #08213d;
            text-shadow:
                2px 2px 0 #08213d,
                0 3px 4px rgba(0, 0, 0, 0.65);
        }

        .bottom-nav {
            position: absolute;
            z-index: 4;
            left: 0;
            right: 0;
            bottom: 0;
            height: 89px;
            padding: 16px 5px 17px;
            display: grid;
            grid-template-columns: 73px 73px 73px 73px 73px;
            gap: 4px;
            align-items: center;
            justify-content: center;
            background: rgba(4, 33, 59, 0.78);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .nav-link {
            height: 43px;
            display: grid;
            place-items: center;
            border-radius: 9px;
            color: #ffffff;
            background: rgba(2, 11, 22, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.38);
            font-size: 14px;
            font-style: italic;
            font-weight: 900;
            line-height: 1;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            transform: scaleX(0.82);
            transform-origin: center;
            white-space: nowrap;
        }

        .nav-link.active {
            height: 43px;
            border-radius: 10px;
            background: #0785ff;
        }
    </style>
</head>

<body>
    <main class="screen">
        <button class="small-logo" type="button" aria-label="Abrir sidebar">
            <img src="../imgs/DC_Comics_logo.svg" alt="">
        </button>

        <div class="sidebar-shade" aria-hidden="true"></div>
        <aside class="sidebar" aria-label="Menu lateral">
            <button class="sidebar-logo" type="button" aria-label="Cerrar sidebar">
                <img src="../imgs/DC_Comics_logo.svg" alt="">
            </button>
            <nav class="sidebar-menu">
                <a class="sidebar-option dashboard" href="dashboard.html">
                    <img src="../imgs/00af94715567fa713114e67d293d6f97.jpg" alt="">
                    <span>Dashboard</span>
                </a>
                <a class="sidebar-option profile" href="profile.html">
                    <img src="../imgs/cf4ae4053175c8f4e54bfa0992527bab.jpg" alt="">
                    <span>My profile</span>
                </a>
                <a class="sidebar-option characters" href="characters.html">
                    <img src="../imgs/Profile.webp" alt="">
                    <span>Characters</span>
                </a>
                <a class="sidebar-option cities" href="cities.html">
                    <img src="../imgs/Central_City_Flash.png" alt="">
                    <span>Cities</span>
                </a>
                <a class="sidebar-option teams" href="teams.html">
                    <img src="../imgs/Los_Jovenes_Titanes.avif" alt="">
                    <span>Teams</span>
                </a>
            </nav>
        </aside>

        <section class="content" aria-label="Dashboard DC Comics">
            <div class="profile-stack" aria-hidden="true">
                <span class="profile-chip side">
                    <img src="../imgs/Profile.webp" alt="">
                </span>
                <span class="profile-chip main">
                    <img src="../imgs/wallpaper 1.png" alt="">
                </span>
                <span class="profile-chip front">
                    <img src="../imgs/Los_Jovenes_Titanes.avif" alt="">
                </span>
            </div>

            <h1 class="title">Dashboard</h1>
            <p class="welcome">Welcome to the dashboard</p>

            <div class="tiles" aria-label="Secciones">
                <a class="tile characters" href="characters.html" aria-label="Characters">
                    <img src="../imgs/Profile.webp" alt="">
                    <span class="tile-title">Characters</span>
                </a>

                <a class="tile cities" href="cities.html" aria-label="Cities">
                    <img src="../imgs/Central_City_Flash.png" alt="">
                    <span class="tile-title">Cities</span>
                </a>

                <a class="tile teams" href="teams.html" aria-label="Teams">
                    <img src="../imgs/Los_Jovenes_Titanes.avif" alt="">
                    <span class="tile-title">Teams</span>
                </a>
            </div>
        </section>

        <nav class="bottom-nav" aria-label="Navegacion principal">
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="profile.html">My profile</a>
            <a class="nav-link" href="characters.html">Characters</a>
            <a class="nav-link" href="cities.html">Cities</a>
            <a class="nav-link" href="teams.html">Teams</a>
        </nav>
    </main>

    <script>
        const appWidth = 412;
        const appHeight = 917;

        function keepAndroidCompactSize() {
            const scale = Math.min(
                window.innerWidth / appWidth,
                window.innerHeight / appHeight,
                1
            );

            document.documentElement.style.setProperty("--app-scale", scale);
        }

        keepAndroidCompactSize();
        window.addEventListener("resize", keepAndroidCompactSize);

        const screen = document.querySelector(".screen");
        const smallLogo = document.querySelector(".small-logo");
        const sidebarLogo = document.querySelector(".sidebar-logo");
        const sidebarShade = document.querySelector(".sidebar-shade");
        const sidebarLinks = document.querySelectorAll(".sidebar-option");

        if (smallLogo) {
            smallLogo.addEventListener("click", () => {
                screen.classList.toggle("sidebar-open");
            });
        }

        if (sidebarLogo) {
            sidebarLogo.addEventListener("click", () => {
                screen.classList.remove("sidebar-open");
            });
        }

        if (sidebarShade) {
            sidebarShade.addEventListener("click", () => {
                screen.classList.remove("sidebar-open");
            });
        }

        sidebarLinks.forEach((link) => {
            link.addEventListener("click", () => {
                screen.classList.remove("sidebar-open");
            });
        });
    </script>
</body>

</html>
