<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>City Update</title><link rel="stylesheet" href="sections.css"></head>
<body>
    <main class="screen bg-cities">
        <button class="small-logo" type="button"><img src="../imgs/logoDC.png" alt=""></button><a class="back-icon" href="cities.html">Back</a>
        <div class="sidebar-shade"></div><aside class="sidebar"><button class="sidebar-logo" type="button"><img src="../imgs/logoDC.png" alt=""></button><nav class="sidebar-menu"><a class="sidebar-option" href="dashboard.html"><img src="../imgs/sidebar/dashboard.jpg" alt=""><span>Dashboard</span></a><a class="sidebar-option" href="profile.html"><img src="../imgs/sidebar/myProfile.jpg" alt=""><span>My profile</span></a><a class="sidebar-option" href="characters.html"><img src="../imgs/sidebar/characters.jpg" alt=""><span>Characters</span></a><a class="sidebar-option" href="cities.html"><img src="../imgs/cities/CentralCity.png" alt=""><span>Cities</span></a><a class="sidebar-option" href="teams.html"><img src="../imgs/teams/Los_Jovenes_Titanes.avif" alt=""><span>Teams</span></a></nav></aside>
        <section class="content">
            <h1 class="page-title">City Update</h1>
            <form class="city-update-card" id="cityForm">
                <img id="cityFormImage" src="../imgs/cities/Gotham.jpg" alt="">
                <h2 class="page-title" id="cityFormTitle" style="font-size:37px;margin-top:10px">City</h2>
                <span class="label">City Name:</span><select class="select-field" name="name" id="citySelect"></select>
                <span class="label">Country:</span><input class="field" name="country">
                <span class="label">Status:</span><input class="field" name="state">
                <input name="population_count" type="hidden">
            </form>
            <button class="action-btn" type="submit" form="cityForm">Update</button>
        </section>
        <nav class="bottom-nav"><a class="nav-link" href="dashboard.html">Dashboard</a><a class="nav-link" href="profile.html">My profile</a><a class="nav-link" href="characters.html">Characters</a><a class="nav-link active" href="cities.html">Cities</a><a class="nav-link" href="teams.html">Teams</a></nav>
