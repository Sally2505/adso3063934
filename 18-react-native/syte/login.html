<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC Comics Login</title>
    <style>
        @font-face {
            font-family: "DcTitle";
            src: url("fonts/Gotham.ttf") format("truetype");
            font-weight: 900;
        }

        @font-face {
            font-family: "DcText";
            src: url("fonts/Gotham Nights Bold Italic.otf") format("opentype");
            font-weight: 900;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            color: #0785ff;
            background: #06111d;
            font-family: "DcText", "Impact", "Arial Black", sans-serif;
        }

        .screen {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 412px;
            height: 917px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 82px;
            background: #111 url("../imgs/wallpaper 1.png") center / cover no-repeat;
            transform: translate(-50%, -50%) scale(var(--app-scale, 1));
            transform-origin: center;
        }

        .small-logo {
            position: absolute;
            z-index: 8;
            top: 6px;
            left: 4px;
            width: 48px;
            height: 48px;
            display: block;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
        }

        .back-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            width: 42px;
            height: 42px;
            display: block;
            text-decoration: none;
        }

        .back-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .small-logo img,
        .sidebar-logo img,
        .sidebar-option img,
        .logo-mark img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .sidebar-option img {
            object-fit: cover;
        }

        .sidebar-shade {
            position: absolute;
            z-index: 18;
            inset: 0;
            background: rgba(4, 33, 59, 0.46);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.24s ease;
        }

        .sidebar {
            position: absolute;
            z-index: 19;
            top: 0;
            left: 0;
            width: 297px;
            height: 100%;
            padding: 101px 13px 0;
            background: rgba(4, 33, 59, 0.93);
            transform: translateX(-100%);
            transition: transform 0.24s ease;
            box-shadow: 12px 0 18px rgba(0, 0, 0, 0.24);
        }

        .screen.sidebar-open .sidebar {
            transform: translateX(0);
        }

        .screen.sidebar-open .sidebar-shade {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar-logo {
            position: absolute;
            top: 8px;
            right: 11px;
            width: 48px;
            height: 48px;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
        }

        .sidebar-logo img {
            object-fit: contain;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .sidebar-option {
            position: relative;
            width: 270px;
            height: 96px;
            overflow: hidden;
            border-radius: 18px;
            color: #ffffff;
            text-decoration: none;
            background: #08213d;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }

        .sidebar-option::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(4, 33, 59, 0.18);
            transition: background 0.18s ease;
        }

        .sidebar-option:hover::after,
        .sidebar-option:focus-visible::after,
        .sidebar-option:active::after {
            background: rgba(7, 133, 255, 0.44);
        }

        .sidebar-option span {
            position: absolute;
            z-index: 2;
            inset: 0;
            display: grid;
            place-items: center;
            color: #ffffff;
            font-family: "DcTitle", "Impact", "Arial Black", sans-serif;
            font-size: 30px;
            line-height: 1;
            text-transform: uppercase;
            -webkit-text-stroke: 1.4px #08213d;
            text-shadow:
                2px 2px 0 #08213d,
                0 3px 5px rgba(0, 0, 0, 0.66);
        }

        .sidebar-option.dashboard img {
            object-position: center 45%;
        }

        .sidebar-option.profile img {
            object-position: center 42%;
        }

        .sidebar-option.characters img {
            object-position: center 50%;
        }

        .sidebar-option.cities img {
            object-position: center 48%;
        }

        .sidebar-option.teams img {
            object-position: center 42%;
        }

        .card {
            width: 316px;
            min-height: 420px;
            padding: 19px 24px 34px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(4, 33, 59, 0.82);
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 16, 34, 0.36);
        }

        .logo-mark {
            width: 166px;
            height: 166px;
            display: block;
        }

        .profile-title {
            margin-top: 12px;
            color: #0785ff;
            font-size: 23px;
            line-height: 1;
            font-style: italic;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            transform: scaleX(0.84);
            transform-origin: center;
        }

        .login-form {
            width: 100%;
            margin-top: 26px;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        .field {
            width: 100%;
            height: 48px;
            padding: 0 14px;
            border: 0;
            border-radius: 9px;
            outline: none;
            color: #111;
            background: rgba(246, 242, 244, 0.95);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04), 0 2px 5px rgba(0, 0, 0, 0.18);
            font-family: "DcText", "Impact", "Arial Black", sans-serif;
            font-size: 20px;
            font-style: italic;
            font-weight: 900;
            text-transform: none;
        }

        .field::placeholder {
            color: #111;
            opacity: 1;
        }

        .login-btn {
            width: 118px;
            height: 65px;
            margin-top: 78px;
            display: grid;
            place-items: center;
            border: 0;
            border-radius: 10px;
            color: #0785ff;
            background: rgba(224, 238, 250, 0.94);
            box-shadow: 0 4px 8px rgba(0, 12, 26, 0.32);
            font-family: "DcText", "Impact", "Arial Black", sans-serif;
            font-size: 29px;
            font-style: italic;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.35);
            transform: scaleX(0.88);
            cursor: pointer;
        }

        .login-btn:hover {
            background: rgba(4, 33, 59, 0.9);
        }

        /* Ocultar sidebar en páginas sin autenticación */
        body.no-sidebar .small-logo,
        body.no-sidebar .sidebar,
        body.no-sidebar .sidebar-shade {
            display: none;
        }

        /* Mostrar back-btn en páginas de login/register */
        body.no-sidebar .back-btn {
            display: block;
        }
    </style>
</head>

<body class="no-sidebar">
    <main class="screen">
        <button class="small-logo" type="button" aria-label="Abrir sidebar">
            <img src="../imgs/DC_Comics_logo.svg" alt="">
        </button>

        <div class="sidebar-shade" aria-hidden="true"></div>
        <aside class="sidebar" aria-label="Menu lateral">
            <button class="sidebar-logo" type="button" aria-label="Cerrar sidebar">
                <img src="../imgs/DC_Comics_logo.svg" alt="">
            </button>
            <nav class="sidebar-menu">
                <a class="sidebar-option dashboard" href="dashboard.html">
                    <img src="../imgs/00af94715567fa713114e67d293d6f97.jpg" alt="">
                    <span>Dashboard</span>
                </a>
                <a class="sidebar-option profile" href="profile.html">
                    <img src="../imgs/cf4ae4053175c8f4e54bfa0992527bab.jpg" alt="">
                    <span>My profile</span>
                </a>
                <a class="sidebar-option characters" href="characters.html">
                    <img src="../imgs/Profile.webp" alt="">
                    <span>Characters</span>
                </a>
                <a class="sidebar-option cities" href="cities.html">
                    <img src="../imgs/Central_City_Flash.png" alt="">
                    <span>Cities</span>
                </a>
                <a class="sidebar-option teams" href="teams.html">
                    <img src="../imgs/Los_Jovenes_Titanes.avif" alt="">
                    <span>Teams</span>
                </a>
            </nav>
        </aside>

        <a class="back-btn" href="index.html" aria-label="Volver">
            <img src="../imgs/return button.png" alt="">
        </a>

        <section class="card" aria-label="Formulario de login DC Comics">
            <div class="logo-mark" aria-hidden="true">
                <img src="../imgs/DC_Comics_logo.svg" alt="">
            </div>

            <h1 class="profile-title">Enter your profile</h1>

            <form class="login-form">
                <input class="field" type="email" name="email" placeholder="Email" autocomplete="email">
                <input class="field" type="password" name="password" placeholder="Password" autocomplete="current-password">
            </form>
        </section>

        <button class="login-btn" type="button" onclick="location.href='dashboard.html'">Login</button>
    </main>

    <script>
        const appWidth = 412;
        const appHeight = 917;

        function keepAndroidCompactSize() {
            const scale = Math.min(
                window.innerWidth / appWidth,
                window.innerHeight / appHeight,
                1
            );

            document.documentElement.style.setProperty("--app-scale", scale);
        }

        keepAndroidCompactSize();
        window.addEventListener("resize", keepAndroidCompactSize);

        const screen = document.querySelector(".screen");
        const sidebarButtons = document.querySelectorAll(".small-logo, .sidebar-logo, .sidebar-shade");

        sidebarButtons.forEach((button) => {
            button.addEventListener("click", () => {
                screen.classList.toggle("sidebar-open");
            });
        });
    </script>
</body>

</html>
