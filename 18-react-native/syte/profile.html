        <div class="sidebar-shade" aria-hidden="true"></div>
        <aside class="sidebar" aria-label="Menu lateral">
            <button class="sidebar-logo" type="button" aria-label="Cerrar sidebar"><img src="../imgs/DC_Comics_logo.svg" alt=""></button>
            <nav class="sidebar-menu">
