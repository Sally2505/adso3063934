<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC Comics Login</title>
    <style>
        @font-face {
            font-family: "DcTitle";
            src: url("fonts/Gotham.ttf") format("truetype");
            font-weight: 900;
        }

        @font-face {
            font-family: "DcText";
            src: url("fonts/Gotham Nights Bold Italic.otf") format("opentype");
            font-weight: 900;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            color: #0079ff;
            background: #06111d;
            font-family: "DcTitle", "Impact", "Arial Black", sans-serif;
        }

        .screen {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 412px;
            height: 917px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 83px;
            background: #111 url("../imgs/fondos/dashboard.png") center / cover no-repeat;
            transform: translate(-50%, -50%) scale(var(--app-scale, 1));
            transform-origin: center;
        }

        .small-logo {
            position: absolute;
            z-index: 8;
            top: 6px;
            left: 4px;
            width: 48px;
            height: 48px;
            display: block;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
        }

        .small-logo img,
        .sidebar-logo img,
        .sidebar-option img,
        .logo-mark img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .sidebar-option img {
            object-fit: cover;
        }

        .sidebar-shade {
            position: absolute;
            z-index: 18;
            inset: 0;
            background: rgba(4, 33, 59, 0.46);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.24s ease;
        }

        .sidebar {
            position: absolute;
            z-index: 19;
            top: 0;
            left: 0;
            width: 297px;
            height: 100%;
            padding: 101px 13px 0;
            background: rgba(4, 33, 59, 0.93);
            transform: translateX(-100%);
            transition: transform 0.24s ease;
            box-shadow: 12px 0 18px rgba(0, 0, 0, 0.24);
        }

        .screen.sidebar-open .sidebar {
            transform: translateX(0);
        }

        .screen.sidebar-open .sidebar-shade {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar-logo {
            position: absolute;
            top: 8px;
            right: 11px;
            width: 48px;
            height: 48px;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
        }

        .sidebar-logo img {
            object-fit: contain;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .sidebar-option {
            position: relative;
            width: 270px;
            height: 96px;
            overflow: hidden;
            border-radius: 18px;
            color: #ffffff;
            text-decoration: none;
            background: #08213d;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }

        .sidebar-option::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(4, 33, 59, 0.18);
            transition: background 0.18s ease;
        }

        .sidebar-option:hover::after,
        .sidebar-option:focus-visible::after,
        .sidebar-option:active::after {
            background: rgba(7, 133, 255, 0.44);
        }

        .sidebar-option span {
            position: absolute;
            z-index: 2;
            inset: 0;
            display: grid;
            place-items: center;
            color: #ffffff;
            font-family: "DcTitle", "Impact", "Arial Black", sans-serif;
            font-size: 30px;
            line-height: 1;
            text-transform: uppercase;
            -webkit-text-stroke: 1.4px #08213d;
            text-shadow:
                2px 2px 0 #08213d,
                0 3px 5px rgba(0, 0, 0, 0.66);
        }

        .sidebar-option.dashboard img {
            object-position: center 45%;
        }

        .sidebar-option.profile img {
            object-position: center 42%;
        }

        .sidebar-option.characters img {
            object-position: center 50%;
        }

        .sidebar-option.cities img {
            object-position: center 48%;
        }

        .sidebar-option.teams img {
            object-position: center 42%;
        }

        .card {
            width: 316px;
            min-height: 444px;
            padding: 17px 20px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(4, 33, 59, 0.82);
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 16, 34, 0.36);
        }

        .logo-mark {
            width: 166px;
            height: 166px;
            display: block;
        }

        .brand {
            margin-top: 17px;
            color: #0785ff;
            font-size: 42px;
            line-height: 1;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .question {
            width: 274px;
            margin-top: 38px;
            color: #ffffff;
            font-size: 24px;
            line-height: 1.38;
            text-align: center;
            text-transform: uppercase;
            font-style: italic;
            font-weight: 900;
            font-family: "DcText", "Impact", "Arial Black", sans-serif;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.42);
            transform: scaleX(0.82);
            transform-origin: center top;
        }

        .actions {
            width: 284px;
            margin-top: 70px;
            display: flex;
            justify-content: space-between;
            gap: 54px;
        }

        .btn {
            width: 116px;
            height: 65px;
            display: grid;
            place-items: center;
            border: 0;
            border-radius: 10px;
            color: #0785ff;
            background: rgba(224, 238, 250, 0.94);
            box-shadow: 0 4px 8px rgba(0, 12, 26, 0.32);
            font-family: "DcText", "Impact", "Arial Black", sans-serif;
            font-size: 29px;
            font-style: italic;
            font-weight: 900;
            letter-spacing: 0;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.35);
            transform: scaleX(0.88);
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(4, 33, 59, 0.9);
        }

        .section-preview {
            width: 100%;
            margin-top: 22px;
            padding: 0 18px;
            display: grid;
            gap: 10px;
        }

        .section-pill {
            position: relative;
            height: 74px;
            overflow: hidden;
            border-radius: 14px;
            text-decoration: none;
            box-shadow: 0 4px 8px rgba(0, 12, 26, 0.24);
        }

        .section-pill img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            filter: saturate(1.05) contrast(1.02);
        }

        .section-pill span {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: #ffffff;
            font-family: "DcTitle", "Impact", "Arial Black", sans-serif;
            font-size: 20px;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: rgba(4, 33, 59, 0.24);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.62);
        }

        .section-pill:hover span,
        .section-pill:focus-visible span {
            background: rgba(7, 133, 255, 0.42);
        }

        /* Ocultar sidebar en páginas sin autenticación */
        body.no-sidebar .small-logo,
        body.no-sidebar .sidebar,
        body.no-sidebar .sidebar-shade {
            display: none;
        }

    </style>
</head>

<body class="no-sidebar">
    <main class="screen">
        <button class="small-logo" type="button" aria-label="Abrir sidebar">
            <img src="../imgs/logoDC.png" alt="">
        </button>

        <div class="sidebar-shade" aria-hidden="true"></div>
        <aside class="sidebar" aria-label="Menu lateral">
            <button class="sidebar-logo" type="button" aria-label="Cerrar sidebar">
                <img src="../imgs/logoDC.png" alt="">
            </button>
            <nav class="sidebar-menu">
                <a class="sidebar-option dashboard" href="dashboard.html">
                    <img src="../imgs/sidebar/dashboard.jpg" alt="">
                    <span>Dashboard</span>
                </a>
                <a class="sidebar-option profile" href="profile.html">
                    <img src="../imgs/sidebar/myProfile.jpg" alt="">
                    <span>My profile</span>
                </a>
                <a class="sidebar-option characters" href="characters.html">
                    <img src="../imgs/sidebar/characters.jpg" alt="">
                    <span>Characters</span>
                </a>
                <a class="sidebar-option cities" href="cities.html">
                    <img src="../imgs/cities/CentralCity.png" alt="">
                    <span>Cities</span>
                </a>
                <a class="sidebar-option teams" href="teams.html">
                    <img src="../imgs/teams/Los_Jovenes_Titanes.avif" alt="">
                    <span>Teams</span>
                </a>
            </nav>
        </aside>

        <section class="card" aria-label="Login DC Comics">
            <div class="logo-mark" aria-hidden="true">
                <img src="../imgs/logoDC.png" alt="">
            </div>
            <h1 class="brand">DC Comics</h1>
            <p class="question" id="dcFact">
                Did you know that the initials DC come from Detective Comics,
                the legendary magazine where Batman first appeared?
            </p>
        </section>

        <div class="actions" aria-label="Acciones">
            <button class="btn" type="button" onclick="location.href='login.html'">Login</button>
            <button class="btn" type="button" onclick="location.href='register.html'">Register</button>
        </div>
    </main>

    <script>
        const appWidth = 412;
        const appHeight = 917;

        function keepAndroidCompactSize() {
            const scale = Math.min(
                window.innerWidth / appWidth,
                window.innerHeight / appHeight,
                1
            );

            document.documentElement.style.setProperty("--app-scale", scale);
        }

        keepAndroidCompactSize();
        window.addEventListener("resize", keepAndroidCompactSize);

        const screen = document.querySelector(".screen");
        const smallLogo = document.querySelector(".small-logo");
        const sidebarLogo = document.querySelector(".sidebar-logo");
        const sidebarShade = document.querySelector(".sidebar-shade");
        const sidebarLinks = document.querySelectorAll(".sidebar-option");

        if (smallLogo) {
            smallLogo.addEventListener("click", () => {
                screen.classList.toggle("sidebar-open");
            });
        }

        if (sidebarLogo) {
            sidebarLogo.addEventListener("click", () => {
                screen.classList.remove("sidebar-open");
            });
        }

        if (sidebarShade) {
            sidebarShade.addEventListener("click", () => {
                screen.classList.remove("sidebar-open");
            });
        }

        sidebarLinks.forEach((link) => {
            link.addEventListener("click", () => {
                screen.classList.remove("sidebar-open");
            });
        });
    </script>
</body>

</html>
