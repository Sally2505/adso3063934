<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC Comics Register</title>
    <style>
        @font-face {
            font-family: "DcTitle";
            src: url("fonts/Gotham.ttf") format("truetype");
            font-weight: 900;
        }

        @font-face {
            font-family: "DcText";
            src: url("fonts/Gotham Nights Bold Italic.otf") format("opentype");
            font-weight: 900;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            color: #0785ff;
            background: #06111d;
            font-family: "DcText", "Impact", "Arial Black", sans-serif;
        }

        .screen {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 412px;
            height: 917px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 82px;
            background: #111 url("../imgs/wallpaper 1.png") center / cover no-repeat;
            transform: translate(-50%, -50%) scale(var(--app-scale, 1));
            transform-origin: center;
        }

        .small-logo {
            position: absolute;
            top: 6px;
            left: 4px;
            width: 48px;
            height: 48px;
            display: block;
        }

        .back-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            width: 42px;
            height: 42px;
            display: block;
            text-decoration: none;
        }

        .small-logo img,
        .back-btn img,
        .logo-mark img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .card {
            width: 316px;
            min-height: 510px;
            padding: 19px 24px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(4, 33, 59, 0.82);
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 16, 34, 0.36);
        }

        .logo-mark {
            width: 166px;
            height: 166px;
            display: block;
        }

        .register-title {
            margin-top: 12px;
            color: #0785ff;
            font-size: 23px;
            line-height: 1;
            font-style: italic;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            transform: scaleX(0.84);
            transform-origin: center;
        }

        .register-form {
            width: 100%;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 31px;
        }

        .field {
            width: 100%;
            height: 48px;
            padding: 0 14px;
            border: 0;
            border-radius: 9px;
            outline: none;
            color: #111;
            background: rgba(246, 242, 244, 0.95);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04), 0 2px 5px rgba(0, 0, 0, 0.18);
            font-family: "DcText", "Impact", "Arial Black", sans-serif;
            font-size: 20px;
            font-style: italic;
            font-weight: 900;
        }

        .field::placeholder {
            color: #111;
            opacity: 1;
        }

        .register-btn {
            width: 132px;
            height: 65px;
            margin-top: 29px;
            display: grid;
            place-items: center;
            border: 0;
            border-radius: 10px;
            color: #0785ff;
            background: rgba(4, 33, 59, 0.9);
            box-shadow: 0 4px 8px rgba(0, 12, 26, 0.32);
            font-family: "DcText", "Impact", "Arial Black", sans-serif;
            font-size: 28px;
            font-style: italic;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.35);
            transform: scaleX(0.88);
            cursor: pointer;
        }

        .register-btn:hover {
            background: rgba(7, 46, 82, 0.94);
        }
    </style>
</head>

<body>
    <main class="screen">
        <a class="small-logo" href="index.html" aria-label="Volver al inicio">
            <img src="../imgs/DC_Comics_logo.svg" alt="">
        </a>

        <a class="back-btn" href="index.html" aria-label="Volver">
            <img src="../imgs/return button.png" alt="">
        </a>

        <section class="card" aria-label="Formulario de registro DC Comics">
            <div class="logo-mark" aria-hidden="true">
                <img src="../imgs/DC_Comics_logo.svg" alt="">
            </div>

            <h1 class="register-title">Register here</h1>

            <form class="register-form">
                <input class="field" type="text" name="name" placeholder="Name" autocomplete="name">
                <input class="field" type="email" name="email" placeholder="Email" autocomplete="email">
                <input class="field" type="password" name="password" placeholder="Password" autocomplete="new-password">
                <input class="field" type="password" name="confirm-password" placeholder="Confirm password" autocomplete="new-password">
            </form>
        </section>

        <button class="register-btn" type="button">Register</button>
    </main>

    <script>
        const appWidth = 412;
        const appHeight = 917;

        function keepAndroidCompactSize() {
            const scale = Math.min(
                window.innerWidth / appWidth,
                window.innerHeight / appHeight,
                1
            );

            document.documentElement.style.setProperty("--app-scale", scale);
        }

        keepAndroidCompactSize();
        window.addEventListener("resize", keepAndroidCompactSize);
    </script>
</body>

</html>
