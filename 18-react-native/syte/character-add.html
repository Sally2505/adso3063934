<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Add Character</title><link rel="stylesheet" href="sections.css"></head>
<body>
    <main class="screen bg-characters">
        <button class="small-logo" type="button"><img src="../imgs/logoDC.png" alt=""></button><a class="back-icon" href="characters.html">‹</a>
        <div class="sidebar-shade"></div><aside class="sidebar"><button class="sidebar-logo" type="button"><img src="../imgs/logoDC.png" alt=""></button><nav class="sidebar-menu"><a class="sidebar-option" href="dashboard.html"><img src="../imgs/sidebar/dashboard.jpg" alt=""><span>Dashboard</span></a><a class="sidebar-option" href="profile.html"><img src="../imgs/sidebar/myProfile.jpg" alt=""><span>My profile</span></a><a class="sidebar-option" href="characters.html"><img src="../imgs/sidebar/characters.jpg" alt=""><span>Characters</span></a><a class="sidebar-option" href="cities.html"><img src="../imgs/cities/CentralCity.png" alt=""><span>Cities</span></a><a class="sidebar-option" href="teams.html"><img src="../imgs/teams/Los_Jovenes_Titanes.avif" alt=""><span>Teams</span></a></nav></aside>
        <section class="content">
            <h1 class="page-title large-title" style="margin-top:14px">Add Character</h1>
            <form class="character-form" id="characterForm">
                <div class="form-top">
                    <div class="unknown"></div>
                    <div><span class="label" style="margin:0;text-align:left">Name:</span><input class="field" name="name"><span class="label" style="margin:0;text-align:left">Real Name:</span><input class="field" name="real_name"></div>
                </div>
                <div class="grid-form">
                    <div><span class="label" style="text-align:left">Age:</span><input class="field" name="age" type="number"><span class="label" style="text-align:left">Role:</span><input class="field" name="role"><span class="label" style="text-align:left">Ability:</span><input class="field" name="ability"><span class="label" style="text-align:left">Alignment:</span><input class="field" name="alignment"><span class="label" style="text-align:left">Enemy of:</span><input class="field" name="enemy"><span class="label" style="text-align:left">City:</span><select class="select-field" name="city" id="citySelect"></select><span class="label" style="text-align:left">Team:</span><input class="field" name="team"></div>
                    <div><span class="label" style="text-align:left">Photo URL:</span><input class="field" name="photo_url"><span class="label" style="text-align:left">History:</span><textarea class="field textarea" name="history"></textarea></div>
                </div>
            </form><button class="action-btn" type="submit" form="characterForm">Add</button>
        </section>
        <nav class="bottom-nav"><a class="nav-link" href="dashboard.html">Dashboard</a><a class="nav-link" href="profile.html">My profile</a><a class="nav-link active" href="characters.html">Characters</a><a class="nav-link" href="cities.html">Cities</a><a class="nav-link" href="teams.html">Teams</a></nav>
    </main><script src="sections.js"></script>
</body>
</html>
