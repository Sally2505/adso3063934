<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Team Update</title><link rel="stylesheet" href="sections.css"></head>
<body>
    <main class="screen bg-teams">
        <button class="small-logo" type="button"><img src="../imgs/logoDC.png" alt=""></button><a class="back-icon" href="teams.html">‹</a>
        <div class="sidebar-shade"></div><aside class="sidebar"><button class="sidebar-logo" type="button"><img src="../imgs/logoDC.png" alt=""></button><nav class="sidebar-menu"><a class="sidebar-option" href="dashboard.html"><img src="../imgs/sidebar/dashboard.jpg" alt=""><span>Dashboard</span></a><a class="sidebar-option" href="profile.html"><img src="../imgs/sidebar/myProfile.jpg" alt=""><span>My profile</span></a><a class="sidebar-option" href="characters.html"><img src="../imgs/sidebar/characters.jpg" alt=""><span>Characters</span></a><a class="sidebar-option" href="cities.html"><img src="../imgs/cities/CentralCity.png" alt=""><span>Cities</span></a><a class="sidebar-option" href="teams.html"><img src="../imgs/teams/Los_Jovenes_Titanes.avif" alt=""><span>Teams</span></a></nav></aside>
        <section class="content">
            <h1 class="page-title">Team Update</h1>
            <form class="panel dark form-scroll" id="teamForm" style="margin-top:18px;padding-top:18px;padding-bottom:25px">
                <h2 class="page-title" id="teamFormTitle" style="font-size:38px">Team</h2>
                <input name="name" type="hidden">
                <a class="edit-floating" href="#" style="top:105px;right:30px;width:34px;height:34px;border-radius:50%;background:#dce6ef;color:#08213d;font-size:21px">✎</a>
                <span class="label">Type</span><input class="field" name="type">
                <span class="label">Headquarters</span><input class="field" name="headquarters">
                <span class="label">Photo URL</span><input class="field" name="photo_url">
                <span class="label">Members</span><input class="field" name="members" placeholder="Names separated by comma">
                <span class="label">Delete Member</span>
                <div class="chips-row"><span class="arrow-box">&lt;</span><span id="teamCharacterChips" style="display:flex;gap:17px"></span><span class="arrow-box">&gt;</span></div>
                <span class="label">Add new member</span>
                <div class="chips-row"><span class="arrow-box">&lt;</span><span class="round-icon"><img src="../imgs/icons/characters.png" alt=""></span><span class="round-icon"><img src="../imgs/icons/characters.png" alt=""></span><span class="round-icon"><img src="../imgs/icons/characters.png" alt=""></span><span class="arrow-box">&gt;</span></div>
            </form><button class="action-btn" type="submit" form="teamForm">Update</button>
        </section>
        <nav class="bottom-nav"><a class="nav-link" href="dashboard.html">Dashboard</a><a class="nav-link" href="profile.html">My profile</a><a class="nav-link" href="characters.html">Characters</a><a class="nav-link" href="cities.html">Cities</a><a class="nav-link active" href="teams.html">Teams</a></nav>
    </main><script src="sections.js"></script>
</body>
</html>
