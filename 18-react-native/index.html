<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DC Comics Figma Index</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #3b0f58, #48971b);
            color: #111;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(45deg,
                    rgba(0, 0, 0, 0.08) 0px,
                    rgba(0, 0, 0, 0.08) 40px,
                    transparent 40px,
                    transparent 90px);
            opacity: 0.35;
            pointer-events: none;
        }

        .home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 24px;
            z-index: 5;
        }

        .home-btn svg {
            width: 30px;
            fill: #111;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .logo {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 6px solid rgba(255, 255, 255, 0.7);
            overflow: hidden;
            margin-bottom: 30px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .menu {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .menu button {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.55);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .menu button:hover {
            transform: translateX(8px) scale(1.03);
            background: rgba(255, 255, 255, 0.8);
        }

        .number {
            background: #2d014d;
            color: white;
            padding: 10px 14px;
            border-radius: 999px;
            min-width: 48px;
            text-align: center;
            font-weight: bold;
        }

        .viewer {
            width: 90%;
            max-width: 1200px;
            height: 700px;
            margin-top: 35px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
            background: white;
            display: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <a class="home-btn" href="../index.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512">
            <path
                d="M575.8 255.5c0 18-15 32.1-32 32.1l-32 0 .7 160.2c0 2.7-.2 5.4-.5 8.1l0 16.2c0 22.1-17.9 40-40 40l-16 0c-1.1 0-2.2 0-3.3-.1c-1.4 .1-2.8 .1-4.2 .1L416 512l-24 0c-22.1 0-40-17.9-40-40l0-24 0-64c0-17.7-14.3-32-32-32l-64 0c-17.7 0-32 14.3-32 32l0 64 0 24c0 22.1-17.9 40-40 40l-24 0-31.9 0c-1.5 0-3-.1-4.5-.2c-1.2 .1-2.4 .2-3.6 .2l-16 0c-22.1 0-40-17.9-40-40l0-112c0-.9 0-1.9 .1-2.8l0-69.7-32 0c-18 0-32-14-32-32.1c0-9 3-17 10-24L266.4 8c7-7 15-8 22-8s15 2 21 7L564.8 231.5c8 7 12 15 11 24z" />
        </svg>
    </a>

    <div class="container">
        <h1>01 - DC Comics</h1>
        <p class="subtitle">Interactive Figma File Gallery</p>

        <div class="logo">
            <img src="/18-react-native/imgs/Robin2.jpg" alt="Dc Comics">
        </div>

        <div class="menu">
            <button
                onclick="openFile('https://embed.figma.com/design/8lZyEEV3uUCTASmxSHttGn/OFAC?node-id=0-1&embed-host=share')">
                <span class="number">01</span> Wireframe
            </button>
            <button
                onclick="window.open('https://embed.figma.com/proto/8lZyEEV3uUCTASmxSHttGn/OFAC?node-id=4-4&p=f&viewport=73%2C93%2C0.28&scaling=scale-down&content-scaling=fixed&starting-point-node-id=4%3A4&page-id=0%3A1&embed-host=share')">
                <span class="number">02</span> Wireframe Prototype 
            </button>
            <button
                onclick="openFile('https://embed.figma.com/design/8lZyEEV3uUCTASmxSHttGn/OFAC?node-id=45-1194&embed-host=share')">
                <span class="number">03</span> Style Guide 
            </button>
            <button
                onclick="openFile('https://embed.figma.com/design/8lZyEEV3uUCTASmxSHttGn/OFAC?node-id=33-3&embed-host=share')">
                <span class="number">04</span> Mockup
            </button>
        </div>

        <div class="viewer" id="viewer">
            <iframe id="figmaFrame"></iframe>
        </div>
    </div>

    <script>
        function openFile(url) {
            document.getElementById('figmaFrame').src = url;
            document.getElementById('viewer').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>

</html>
